<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<ul th:fragment="topbarLinks" class="topbar-links">
    <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Login</a></li>
    <li sec:authorize="isAnonymous()"><a th:href="@{/signup}">Sign Up</a></li>
    <li sec:authorize="isAuthenticated()"><a th:href="@{/mypage/bookings}">My Bookings</a></li>
    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">Admin</a></li>
    <li><a th:href="@{/support}">Support</a></li>
    <li sec:authorize="isAuthenticated()" class="auth-inline-item">
        <form th:action="@{/logout}" method="post" class="auth-inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="auth-inline-button">Logout</button>
        </form>
    </li>
    <li><a th:href="@{/booking}" class="topbar-booking">Quick Booking</a></li>
</ul>

<ul th:fragment="headerLinks" class="nav navbar-nav flex-child-menu menu-right">
    <li><a th:href="@{/booking}" class="menu-link">Showtimes</a></li>
    <li sec:authorize="isAnonymous()"><a th:href="@{/booking/history}" class="menu-link">Guest Booking Lookup</a></li>
    <li sec:authorize="isAnonymous()"><a th:href="@{/login}" class="menu-link">Login</a></li>
    <li sec:authorize="isAuthenticated()"><a th:href="@{/mypage/bookings}" class="menu-link">My Bookings</a></li>
    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}" class="menu-link">Admin</a></li>
    <li sec:authorize="isAuthenticated()" class="auth-header-item">
        <form th:action="@{/logout}" method="post" class="auth-inline-form auth-inline-form--header">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="menu-link auth-inline-button">Logout</button>
        </form>
    </li>
    <li><a th:href="@{/booking}" class="menu-cta">Quick Booking</a></li>
</ul>

<ul th:fragment="adminTopbarLinks" class="topbar-links">
    <li><a th:href="@{/admin}">Dashboard</a></li>
    <li><a th:href="@{/admin/movies}">Movies</a></li>
    <li><a th:href="@{/admin/theaters}">Theaters</a></li>
    <li><a th:href="@{/admin/screens}">Screens</a></li>
    <li><a th:href="@{/admin/schedules}">Schedules</a></li>
    <li><a th:href="@{/admin/bookings}">Bookings</a></li>
    <li><a th:href="@{/mypage/bookings}">My Bookings</a></li>
    <li><a th:href="@{/}">Home</a></li>
    <li class="auth-inline-item">
        <form th:action="@{/logout}" method="post" class="auth-inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="auth-inline-button">Logout</button>
        </form>
    </li>
</ul>
</body>
</html>
