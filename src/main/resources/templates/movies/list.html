<!DOCTYPE html>
<html lang="ko" class="no-js" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CineFlow | 전체 영화</title>
    <meta charset="UTF-8">
    <meta name="description" content="CineFlow 전체 영화 목록">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone-no">
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Dosis:400,700,500|Nunito:300,400,600" />
    <link rel="stylesheet" th:href="@{/css/plugins.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/home-cinema.css}">
</head>
<body>
<div id="preloader">
    <img class="logo" th:src="@{/images/logo1.png}" alt="logo" width="119" height="58">
    <div id="status"><span></span><span></span></div>
</div>

<header th:replace="~{fragments/site-layout :: siteHeader('movies')}"></header>

<main class="cinema-page">
    <section class="cinema-page-hero">
        <div class="container">
            <ul class="cinema-breadcrumb">
                <li><a th:href="@{/}">홈</a></li>
                <li>영화</li>
                <li>전체 영화</li>
            </ul>
            <h1>전체 영화</h1>
            <p>현재 상영작과 개봉 예정작을 확인하고 바로 예매해보세요.</p>
        </div>
    </section>

    <section class="cinema-page-body">
        <div class="container">
            <div class="movie-list-controls">
                <div class="movie-tabs-filter">
                    <button class="is-active">박스오피스</button>
                    <button>현재상영작</button>
                    <button>개봉예정작</button>
                </div>
                <div class="movie-utility-controls">
                    <select>
                        <option>예매율순</option>
                        <option>개봉일순</option>
                        <option>가나다순</option>
                    </select>
                    <select>
                        <option>전체</option>
                        <option>개봉예정만</option>
                    </select>
                    <div class="movie-search-dummy">
                        <i class="ion-ios-search"></i>
                        <input type="text" placeholder="영화 제목 검색">
                    </div>
                </div>
            </div>

            <div class="cinema-movie-grid">
                <article class="cinema-movie-card" th:each="movie, stat : ${movies}" th:classappend="' ' + ${movie.statusCssClass}">
                    <a class="poster-wrap" th:href="@{/movies/{id}(id=${movie.id})}">
                        <span class="rank-badge" th:if="${stat.index < 2}" th:text="${stat.index + 1} + '위'">1위</span>
                        <span class="status-badge" th:if="${stat.index >= 2}" th:classappend="${movie.status.name() == 'COMING_SOON'} ? ' upcoming' : ''" th:text="${movie.statusLabel}">상영중</span>
                        <img th:src="@{${movie.posterUrl}}" th:alt="${movie.title + ' 포스터'}">
                    </a>
                    <div class="movie-card-body">
                        <div class="movie-card-head">
                            <h3><a th:href="@{/movies/{id}(id=${movie.id})}" th:text="${movie.title}">영화 제목</a></h3>
                            <span th:class="${movie.ageBadgeCssClass}" th:text="${movie.ageRating}">12</span>
                        </div>
                        <ul class="movie-meta-mini">
                            <li th:text="${movie.metricName + ' ' + movie.bookingRate + '%'}">예매율 31.2%</li>
                            <li th:text="${movie.scoreMetricName + ' ' + movie.score}">평점 9.1</li>
                            <li th:text="${'개봉 ' + #temporals.format(movie.releaseDate, 'yyyy.MM.dd')}">개봉 2026.04.10</li>
                        </ul>
                        <div class="movie-card-actions">
                            <a th:href="@{/booking(movieId=${movie.id})}" class="book-btn">바로예매</a>
                            <a th:href="@{/movies/{id}(id=${movie.id})}" class="detail-link">상세보기</a>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/site-layout :: siteFooter}"></footer>

<script th:src="@{/js/jquery.js}"></script>
<script th:src="@{/js/plugins.js}"></script>
<script th:src="@{/js/plugins2.js}"></script>
<script th:src="@{/js/custom.js}"></script>
</body>
</html>
